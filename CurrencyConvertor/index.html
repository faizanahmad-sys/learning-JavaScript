<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="converter-card">
        <div class="card-header">
            <h1>Currency Converter</h1>
            <p class="subtitle">Convert between popular currencies instantly</p>
        </div>

        <form id="converter-form">
            <div class="form-group">
                <label for="amount">Amount</label>
                <input id="amount" type="number" value="100" placeholder="Enter amount" />
            </div>

            <div class="currency-row">
                <div class="currency-group">
                    <label for="from-currency">From</label>
                    <div class="select-wrapper">
                        <select id="from-currency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="INR">INR - Indian Rupee</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                            <option value="CNY">CNY - Chinese Yuan</option>
                            <option value="SEK">SEK - Swedish Krona</option>
                            <option value="NZD">NZD - New Zealand Dollar</option>
                            <option value="MXN">MXN - Mexican Peso</option>
                            <option value="SGD">SGD - Singapore Dollar</option>
                            <option value="HKD">HKD - Hong Kong Dollar</option>
                            <option value="NOK">NOK - Norwegian Krone</option>
                            <option value="KRW">KRW - South Korean Won</option>
                            <option value="TRY">TRY - Turkish Lira</option>
                            <option value="RUB">RUB - Russian Ruble</option>
                            <option value="BRL">BRL - Brazilian Real</option>
                            <option value="ZAR">ZAR - South African Rand</option>
                            <option value="DKK">DKK - Danish Krone</option>
                            <option value="PLN">PLN - Polish Zloty</option>
                            <option value="THB">THB - Thai Baht</option>
                            <option value="IDR">IDR - Indonesian Rupiah</option>
                            <option value="HUF">HUF - Hungarian Forint</option>
                            <option value="CZK">CZK - Czech Koruna</option>
                            <option value="ILS">ILS - Israeli Shekel</option>
                            <option value="CLP">CLP - Chilean Peso</option>
                            <option value="PHP">PHP - Philippine Peso</option>
                            <option value="AED">AED - UAE Dirham</option>
                            <option value="COP">COP - Colombian Peso</option>
                            <option value="SAR">SAR - Saudi Riyal</option>
                            <option value="MYR">MYR - Malaysian Ringgit</option>
                            <option value="RON">RON - Romanian Leu</option>
                            <option value="VND">VND - Vietnamese Dong</option>
                            <option value="EGP">EGP - Egyptian Pound</option>
                            <option value="PKR">PKR - Pakistani Rupee</option>
                            <option value="NGN">NGN - Nigerian Naira</option>
                            <option value="BDT">BDT - Bangladeshi Taka</option>
                        </select>
                    </div>
                </div>

                <button type="button" id="swap-btn" class="swap-button" aria-label="Swap currencies">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16V4M7 4L3 8M7 4l4 4"/>
                        <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </button>

                <div class="currency-group">
                    <label for="to-currency">To</label>
                    <div class="select-wrapper">
                        <select id="to-currency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR" selected>EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="INR">INR - Indian Rupee</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                            <option value="CNY">CNY - Chinese Yuan</option>
                            <option value="SEK">SEK - Swedish Krona</option>
                            <option value="NZD">NZD - New Zealand Dollar</option>
                            <option value="MXN">MXN - Mexican Peso</option>
                            <option value="SGD">SGD - Singapore Dollar</option>
                            <option value="HKD">HKD - Hong Kong Dollar</option>
                            <option value="NOK">NOK - Norwegian Krone</option>
                            <option value="KRW">KRW - South Korean Won</option>
                            <option value="TRY">TRY - Turkish Lira</option>
                            <option value="RUB">RUB - Russian Ruble</option>
                            <option value="BRL">BRL - Brazilian Real</option>
                            <option value="ZAR">ZAR - South African Rand</option>
                            <option value="DKK">DKK - Danish Krone</option>
                            <option value="PLN">PLN - Polish Zloty</option>
                            <option value="THB">THB - Thai Baht</option>
                            <option value="IDR">IDR - Indonesian Rupiah</option>
                            <option value="HUF">HUF - Hungarian Forint</option>
                            <option value="CZK">CZK - Czech Koruna</option>
                            <option value="ILS">ILS - Israeli Shekel</option>
                            <option value="CLP">CLP - Chilean Peso</option>
                            <option value="PHP">PHP - Philippine Peso</option>
                            <option value="AED">AED - UAE Dirham</option>
                            <option value="COP">COP - Colombian Peso</option>
                            <option value="SAR">SAR - Saudi Riyal</option>
                            <option value="MYR">MYR - Malaysian Ringgit</option>
                            <option value="RON">RON - Romanian Leu</option>
                            <option value="VND">VND - Vietnamese Dong</option>
                            <option value="EGP">EGP - Egyptian Pound</option>
                            <option value="PKR">PKR - Pakistani Rupee</option>
                            <option value="NGN">NGN - Nigerian Naira</option>
                            <option value="BDT">BDT - Bangladeshi Taka</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="convert-button">Convert</button>

            <div id="result" class="result-container hidden">
                <div class="result-amount">
                    <span id="converted-amount">0.00</span>
                    <span id="result-currency">EUR</span>
                </div>
                <p id="exchange-rate" class="exchange-rate"></p>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
